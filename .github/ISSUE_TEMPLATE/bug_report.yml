name: Bug Report
description: Report a problem with WritBase
labels: ["bug"]
body:
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Supabase Cloud
        - Self-hosted Supabase
        - Local development (supabase start)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue you encountered.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - MCP Server
        - Dashboard (UI)
        - Database / Migrations
        - Authentication
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant versions (Node.js, Supabase CLI, browser, OS).
    validations:
      required: false
